<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hatch Legends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ✨ PARTICLES -->
  <div class="particles"></div>

  <!-- 🔥 NAV / LOGO -->
  <header class="nav">
    <img src="assets/images/logo.png" alt="Hatch Legends Logo" class="logo">
  </header>

  <!-- 🚀 HERO -->
  <main class="hero">

    <!-- LEFT SIDE -->
    <section class="hero-left">
      <p class="subtitle">Awaken the Aurorians.</p>

      <!-- DISCORD -->
      <a href="https://discord.gg/yN4QGrazZM" target="_blank" class="btn-discord">
        <img src="assets/ui/discord_creature_1024.png" alt="Discord Creature">
        <img src="assets/ui/discord_logo_text_purple.png" alt="Discord">
      </a>

      <!-- DONATE -->
      <a href="https://paypal.me/HatchLegends/5EUR" target="_blank" class="btn-donate">
        <img src="assets/ui/donate_button.png" alt="Donate">
      </a>

      <p class="donate-text">Supports development of Hatch Legends (and coffee ☕)</p>
      
    </section>

    <!-- RIGHT SIDE -->
    <section class="hero-right">
      <img src="assets/images/solrael.png" alt="Solrael" class="hero-character">
    </section>

  </main>

  <!-- 📄 FOOTER -->
  <footer class="footer">
    <img src="assets/ui/copyright.png" alt="Copyright">
  </footer>

</body>
</html>
